<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mega-Systems: Access & Dominance</title>
<style>
:root {
  --bg:#f4efe3; --paper:#e7dcc4; --ink:#2b2418; --muted:#70624a; --line:#5b4c35;
  --panel:#fff9e8; --dark:#1f2b33;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font-family: Arial, Helvetica, sans-serif; }
header { background:#202a31; color:#f6e3ad; padding:10px 14px; border-bottom:3px solid #725a32; display:flex; align-items:center; justify-content:space-between; gap:12px; }
header h1 { margin:0; font-size:18px; letter-spacing:.04em; text-transform:uppercase; }
header .sub { color:#d5c69a; font-size:12px; }
button, select, input { font:inherit; }
button { background:#f2e1b7; border:1px solid #6e5b3c; border-radius:4px; padding:6px 9px; cursor:pointer; color:#20170d; box-shadow:0 1px 0 #fff inset; }
button:hover { background:#ffe8ad; }
button.primary { background:#d3a940; color:#111; font-weight:bold; }
button.danger { background:#e5b4a9; }
select, input { background:#fffaf0; border:1px solid #8a7656; padding:5px; border-radius:4px; }
.app { display:grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 54px); min-height:680px; }
.sidebar { background:#efe4cc; border-right:2px solid #7d6c4e; overflow:auto; padding:12px; }
.sidebar.right { border-left:2px solid #7d6c4e; border-right:0; }
.panel { background:#fff8e6; border:1px solid #8d7959; margin-bottom:12px; padding:10px; border-radius:6px; }
.panel h2 { margin:0 0 8px; font-size:14px; text-transform:uppercase; letter-spacing:.05em; color:#4a3219; }
.row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin:6px 0; }
.score-table { width:100%; border-collapse:collapse; font-size:12px; }
.score-table th, .score-table td { border-bottom:1px solid #d2c19a; padding:3px 4px; text-align:right; }
.score-table th:first-child, .score-table td:first-child { text-align:left; }
.board-wrap { position:relative; overflow:auto; background:radial-gradient(circle at center, #fcf3d4 0%, #e3d4ad 75%); }
#boardScaler { transform-origin: top left; width:1800px; height:1050px; position:relative; }
#board { width:1800px; height:1050px; position:relative; background:linear-gradient(0deg, rgba(129,105,60,.10) 1px, transparent 1px), linear-gradient(90deg, rgba(129,105,60,.10) 1px, transparent 1px); background-size:50px 50px; }
.region-label { position:absolute; font-family:Georgia,serif; color:rgba(43,36,24,.38); font-size:22px; font-weight:bold; text-transform:uppercase; letter-spacing:.08em; pointer-events:none; }
.country-card { position:absolute; border:2px solid #2e2a20; background:#c7c7bd; box-shadow:2px 2px 0 rgba(0,0,0,.45); }
.country-card.selected { outline:3px solid #111; box-shadow:0 0 0 4px #f2cc60, 2px 2px 0 rgba(0,0,0,.45); }
.country-head { height:18px; line-height:18px; text-align:center; font-weight:700; font-size:10px; color:#171714; background:#b8b8b0; border-bottom:2px solid #2e2a20; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 2px; }
.tiles { display:flex; flex-wrap:wrap; align-content:flex-start; }
.tile { width:38px; height:34px; border-right:2px solid #2e2a20; border-bottom:2px solid #2e2a20; position:relative; overflow:hidden; }
.tile:nth-child(3n) {}
.tile .sys-label { position:absolute; top:1px; left:2px; color:#111; font-weight:800; font-size:8px; text-shadow:0 1px rgba(255,255,255,.5); }
.tile .icon { position:absolute; right:2px; top:0px; font-size:11px; opacity:.85; }
.slots { position:absolute; left:2px; right:2px; bottom:2px; display:flex; flex-wrap:wrap; gap:1px; align-items:center; }
.empty-slot { width:8px; height:8px; border-radius:50%; border:1px dashed rgba(0,0,0,.5); background:rgba(255,255,255,.22); }
.marker { width:11px; height:11px; border-radius:50%; border:1px solid #111; box-shadow: inset 0 1px 2px rgba(255,255,255,.85), inset 0 -1px 2px rgba(0,0,0,.5), 0 1px 1px rgba(0,0,0,.45); position:relative; overflow:hidden; display:inline-block; flex:0 0 auto; }
.marker::after { content:''; position:absolute; top:1px; left:2px; width:5px; height:3px; border-radius:50%; background:rgba(255,255,255,.55); }
.marker.big { width:22px; height:22px; }
.marker.big::after { width:10px; height:6px; left:4px; top:2px; }
.flag-US { background:linear-gradient(to bottom,#b22234 0 12%,#fff 12% 24%,#b22234 24% 36%,#fff 36% 48%,#b22234 48% 60%,#fff 60% 72%,#b22234 72% 84%,#fff 84% 100%); }
.flag-US:before { content:''; position:absolute; left:0; top:0; width:48%; height:52%; background:#3c3b6e; }
.flag-CN { background:#de2910; } .flag-CN:before { content:'★'; position:absolute; color:#ffde00; font-size:7px; line-height:11px; left:1px; top:-1px; }
.flag-DE { background:linear-gradient(to bottom,#000 0 33%,#dd0000 33% 66%,#ffce00 66% 100%); }
.flag-FR { background:linear-gradient(to right,#0055a4 0 33%,#fff 33% 66%,#ef4135 66% 100%); }
.flag-NL { background:linear-gradient(to bottom,#ae1c28 0 33%,#fff 33% 66%,#21468b 66% 100%); }
.flag-JP { background:radial-gradient(circle at center,#bc002d 0 30%,#fff 31% 100%); }
.flag-IN { background:linear-gradient(to bottom,#ff9933 0 33%,#fff 33% 66%,#138808 66% 100%); } .flag-IN:before { content:''; position:absolute; border:1px solid #000080; border-radius:50%; width:3px; height:3px; left:3px; top:3px; }
.flag-RU { background:linear-gradient(to bottom,#fff 0 33%,#0039a6 33% 66%,#d52b1e 66% 100%); }
.flag-SA { background:#006c35; } .flag-SA:before { content:''; position:absolute; left:2px; right:2px; top:5px; border-top:1px solid white; }
.flag-UK { background:#012169; } .flag-UK:before { content:''; position:absolute; left:-2px; top:4px; width:15px; height:3px; background:#fff; transform:rotate(32deg); box-shadow:0 0 0 1px #c8102e inset; } .flag-UK:after { content:''; position:absolute; left:4px; top:-2px; width:3px; height:15px; background:#fff; box-shadow:0 0 0 1px #c8102e inset; }
.flag-OTH { background:radial-gradient(circle,#cfd3d7,#7a7f85); } .flag-OTH:before { content:'◎'; color:#333; position:absolute; font-size:8px; left:1px; top:0px; }
#log { height:220px; overflow:auto; background:#251f17; color:#f7e7bd; font-family:ui-monospace,Consolas,monospace; font-size:11px; padding:8px; border-radius:4px; }
.logline { margin-bottom:4px; }
.legend-item { display:flex; gap:6px; align-items:center; font-size:12px; margin:3px 0; }
.sys-swatch { width:18px; height:14px; border:1px solid #333; display:inline-flex; align-items:center; justify-content:center; font-weight:bold; font-size:9px; color:#111; }
.actions label { font-size:12px; color:#4a3a25; }
.actions select { width:100%; margin:2px 0 6px; }
.small { font-size:12px; color:#5d4e37; }
</style>

<style>
.board-wrap { position:relative; overflow:hidden; background:#bfe5fb; }
#boardScaler { display:none; }
svg#board { display:block; width:100%; height:100%; min-height:680px; cursor:grab; background:#bfe5fb; }
svg#board.dragging { cursor:grabbing; }
.map-toolbar { position:absolute; z-index:6; left:10px; top:10px; display:flex; gap:6px; background:rgba(31,43,51,.82); border:1px solid #725a32; border-radius:5px; padding:5px; }
.map-toolbar button { padding:4px 8px; font-size:13px; }
.graticule { stroke:#6aa7c8; stroke-width:.35; opacity:.28; fill:none; }
.country { fill:#f6f6dd; stroke:#6b6f73; stroke-width:.72; }
.country.selected { fill:#fbfadf; stroke:#60656a; stroke-width:.82; }
.country-label { fill:#2a2a2a; font-family: Arial, Helvetica, sans-serif; font-weight:700; text-anchor:middle; dominant-baseline:middle; paint-order: stroke; stroke:#ffffeb; stroke-width:1.45; stroke-linejoin:round; pointer-events:none; opacity:.78; }
.connection-line { stroke:#4b3921; stroke-width:.72; stroke-dasharray:2.7 2.1; opacity:.46; fill:none; pointer-events:stroke; }
.connection-line:hover { stroke:#111; opacity:.95; stroke-width:1.25; }
.card { cursor:pointer; }
.card-shadow { fill:#000; opacity:.18; }
.card-base { fill:#e2e2e2; }
.card-header { fill:#e4e4e4; stroke:none; }
.card-title { fill:#070707; font-family: Arial, Helvetica, sans-serif; font-weight:400; text-anchor:middle; dominant-baseline:middle; pointer-events:none; }
.card-region-strip { stroke:none; }
.card-region-frame { fill:none; stroke-width:2.25; shape-rendering:geometricPrecision; }
.card-frame { fill:none; stroke:#0a0a0a; stroke-width:.72; shape-rendering:geometricPrecision; }
.card.selected .card-frame { stroke:#000; stroke-width:1.1; }
.card.selected .card-region-frame { stroke-width:3.15; }
.system-tile { cursor:pointer; }
.tile-bg { stroke:none; }
.icon-line { stroke:#0a0a0a; stroke-width:.95; stroke-linecap:round; stroke-linejoin:round; fill:none; }
.icon-heavy { stroke:#0a0a0a; stroke-width:1.15; stroke-linecap:round; stroke-linejoin:round; fill:none; }
.crumb { fill:#65955b; opacity:.85; }
.empty-svg-slot { fill:rgba(255,255,255,.25); stroke:rgba(0,0,0,.38); stroke-width:.28; stroke-dasharray:.7 .6; }
.marker-outline { fill:none; stroke:#030303; stroke-width:.42; }
.marker-rim { fill:none; stroke:#111; stroke-width:.75; }
.marker-gloss { fill:url(#markerGloss); opacity:.62; pointer-events:none; }
.marker-label { font-family:Arial, sans-serif; font-weight:900; fill:#222; text-anchor:middle; dominant-baseline:middle; pointer-events:none; }
.region-chip { display:flex; align-items:center; gap:6px; font-size:12px; margin:3px 0; }
.region-dot { width:16px; height:12px; border:1px solid #333; display:inline-block; }
.logline.thought { color:#cfe6ff; }
.logline.event { color:#ffe8a3; }
</style>
</head>

<header><div><h1>Mega-Systems: Access & Dominance</h1><div class="sub">Local browser prototype with integrated world map, connected-country lines, region-coded country boxes, and AI reasoning log.</div></div><div class="row"><button onclick="newGame()">New game</button><button onclick="saveFile()">Export save</button><input type="file" id="loadFile" onchange="loadSave(event)" /></div></header>
<div class="app">

      <div class="row"><label>Human:</label><select id="humanSelect"></select></div>

      <div id="turnInfo" class="small"></div>
    </div>

      <label>Mega-system</label><select id="systemSelect"></select>
      <label>Target owner for flip</label><select id="ownerSelect"></select>

function renderConnections() {
  const {connectionLayer}=mapElements(); if(!connectionLayer) return; connectionLayer.innerHTML='';
  const seen=new Set(); const positions=new Set(CARD_POSITIONS.map(d=>d.country));
  for(const c of COUNTRIES) for(const n of c.neighbors||[]) {
    if(!positions.has(c.name)||!positions.has(n)) continue; const key=[c.name,n].sort().join('|'); if(seen.has(key)) continue; seen.add(key);
    const a=cardCenter(c.name), b=cardCenter(n); const line=svgEl('line',{class:'connection-line',x1:a.x,y1:a.y,x2:b.x,y2:b.y}); const title=svgEl('title'); title.textContent=`Connected: ${c.name} ↔ ${n}`; line.appendChild(title); connectionLayer.appendChild(line);
  }
}
function renderCards() {
  const {cardLayer,defs}=mapElements(); if(!cardLayer) return; clipCounter=0; Array.from(defs.querySelectorAll('clipPath[id^="clipMarkerGame"]')).forEach(n=>n.remove()); cardLayer.innerHTML=''; for(const d of CARD_POSITIONS) cardLayer.appendChild(drawCard(d));
}
function selectMapBox(country, system) {
  selectedBox={country,system}; const cs=document.getElementById('countrySelect'); if(cs){cs.value=country; updateSystemOptions(); document.getElementById('systemSelect').value=system;} renderCards();
}
function renderBoard() { renderConnections(); renderCards(); }
function renderStatus() {
  document.getElementById('turnInfo').innerHTML=`<b>Round:</b> ${Math.min(state.round,MAX_ROUNDS)}/${MAX_ROUNDS}<br><b>Current:</b> ${currentPlayer()} (${OWNERS[currentPlayer()].name})<br><b>AP left:</b> ${state.apLeft}<br><b>Role:</b> ${ROLE_BONUS[currentPlayer()]}`;
  let html='<tr><th>Player</th><th>Score</th><th>AP</th></tr>'; for(const p of PLAYERS) html+=`<tr><td><span class="marker flag-${p}"></span> ${p}</td><td>${state.scores[p]}</td><td>${AP[p]}</td></tr>`; document.getElementById('scoreTable').innerHTML=html;
  let shtml='<tr><th>System</th><th>Leader</th><th>Total</th></tr>'; for(const s of Object.keys(SYSTEMS)) { const st=systemStatus(s); shtml+=`<tr><td><span class="sys-swatch" style="background:${SYSTEMS[s].color}">${s}</span></td><td>${st.dominance?st.dominance+' dom':st.leader}</td><td>${st.total}</td></tr>`; } document.getElementById('statusTable').innerHTML=shtml;
  document.getElementById('systemLegend').innerHTML=Object.entries(SYSTEMS).map(([k,v])=>`<div class="legend-item"><span class="sys-swatch" style="background:${v.color}">${k}</span>${v.name}</div>`).join('');
  const regionEl=document.getElementById('regionLegend'); if(regionEl) regionEl.innerHTML=Object.entries(REGION_COLORS).map(([k,v])=>`<div class="region-chip"><span class="region-dot" style="background:${v}"></span>${k}</div>`).join('');
  document.getElementById('ownerLegend').innerHTML=Object.entries(OWNERS).map(([k,v])=>`<div class="legend-item"><span class="marker big flag-${k}"></span><b>${k}</b> ${v.name}</div>`).join('');
}
function renderSelectors() {
  const hs=document.getElementById('humanSelect'); if(!hs.dataset.ready) { hs.innerHTML='<option value="SPECTATE">Spectator / all AI</option>'+PLAYERS.map(p=>`<option value="${p}">${p} - ${OWNERS[p].name}</option>`).join(''); hs.dataset.ready='1'; }
  const cs=document.getElementById('countrySelect'); if(!cs.dataset.ready) { cs.innerHTML=COUNTRIES.map(c=>`<option value="${c.name}">${c.name}</option>`).join(''); cs.dataset.ready='1'; cs.onchange=updateSystemOptions; }
  updateSystemOptions();
  const os=document.getElementById('ownerSelect'); os.innerHTML=Object.keys(OWNERS).map(o=>`<option value="${o}">${o} - ${OWNERS[o].name}</option>`).join('');
}
function updateSystemOptions() { const country=document.getElementById('countrySelect').value||COUNTRIES[0].name; const c=countryInfo(country); const ss=document.getElementById('systemSelect'); const old=ss.value; ss.innerHTML=c.systems.map(s=>`<option value="${s}">${s} - ${SYSTEMS[s].name}</option>`).join(''); if(c.systems.includes(old)) ss.value=old; const p=currentPlayer(); document.getElementById('actionHint').textContent=`Placement cost for ${p} in ${country}: ${placeCost(p,country)} AP. Free slots depend on selected system.`; }
function escapeHTML(s){ return String(s).replace(/[&<>]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch])); }
function renderLog() { document.getElementById('log').innerHTML=(state.log||[]).map(x=>{ const obj=typeof x==='string'?{text:x,kind:''}:x; return `<div class="logline ${obj.kind||''}">${escapeHTML(obj.text)}</div>`; }).join(''); }
function saveFile() { const data=JSON.stringify(state,null,2); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([data],{type:'application/json'})); a.download='mega-systems-save.json'; a.click(); }
function loadSave(e) { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ state=JSON.parse(r.result); renderAll(); }; r.readAsText(f); }
// Public hooks for future extensions.
window.addInfluenceMarker=function(country, system, owner, count=1){ let n=0; for(let i=0;i<count;i++) n+=addMarker(country,system,owner,1); renderAll(); return n; };
window.removeInfluenceMarker=function(country, system, owner, count=1){ let n=removeMarker(country,system,owner,count); renderAll(); return n; };
window.clearBox=function(country, system){ if(state.board[country]) state.board[country][system]={}; renderAll(); };
window.getBoardState=function(){ return clone(state.board); };
window.setBoardState=function(newState){ state.board=clone(newState); renderAll(); };
window.exportBoardState=function(){ return JSON.stringify(state.board,null,2); };
window.importBoardState=function(json){ state.board=JSON.parse(json); renderAll(); };
initMap();
newGame();
</script>
</body>
</html>
